[tools]
rust = "1.94"

[tasks.fmt]
description = "Check Rust formatting"
run = "cargo fmt --all --check"

[tasks.clippy]
description = "Run strict clippy checks"
run = "cargo clippy --workspace --locked --all-targets -- -D warnings"

[tasks.test]
description = "Run workspace tests"
run = "cargo test --workspace --locked"

[tasks.release-check]
description = "Run the core release checks"
depends = ["fmt", "clippy", "test"]
