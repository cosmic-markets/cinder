name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --locked --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --locked

  extended:
    name: Extended release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Vendored crate all-features test
        run: cargo test --locked --manifest-path crates/phoenix-eternal-types/Cargo.toml --all-features
      - name: Package metadata smoke
        run: cargo package -p phoenix-eternal-types --locked --no-verify
      - name: Release build
        run: cargo build --workspace --release --locked
      - name: Docker build
        run: docker build --pull=false -t cinder:ci .

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
